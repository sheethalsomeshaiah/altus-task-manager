<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
</head>
<body>

<h1>Edit Task</h1>

<form method="POST">

    <label>Title:</label><br>
    <input type="text" name="title" value="{{ task.title }}" required>
    <br><br>

    <label>Description:</label><br>
    <textarea name="description">{{ task.description }}</textarea>
    <br><br>

    <label>Assignee Email:</label><br>
    <input type="email" name="assignee_email" value="{{ task.assignee_email or '' }}">
    <br><br>

    <label>Priority:</label><br>
    <select name="priority">
        <option value="Low" {% if task.priority == "Low" %} selected {% endif %}>Low</option>
        <option value="Medium" {% if task.priority == "Medium" %} selected {% endif %}>Medium</option>
        <option value="High" {% if task.priority == "High" %} selected {% endif %}>High</option>
    </select>
    <br><br>

    <label>Status:</label><br>
    <select name="status">

        <option value="Pending"
        {% if task.status == "Pending" %} selected {% endif %}>
        Pending
        </option>

        <option value="Completed"
        {% if task.status == "Completed" %} selected {% endif %}>
        Completed
        </option>

    </select>

    <br><br>

    <button type="submit">Update Task</button>

</form>

<br>

<a href="{{ url_for('main.index') }}">Back</a>

</body>
</html>
